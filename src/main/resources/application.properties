spring.application.name=demo-backend


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/porsdash}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# HikariCP - prevent stale/dropped connections
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=120000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

vapid.public=${VAPID_PUBLIC_KEY:}
vapid.private=${VAPID_PRIVATE_KEY:}
vapid.subject=${VAPID_SUBJECT:mailto:you@example.com}

