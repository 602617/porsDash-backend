spring.application.name=demo-backend


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/porsdash}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

vapid.public=${VAPID_PUBLIC_KEY:}
vapid.private=${VAPID_PRIVATE_KEY:}
vapid.subject=${VAPID_SUBJECT:mailto:you@example.com}

